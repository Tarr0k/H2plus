# H2-Lauf-Deploy-Config für deploy_mujoco.py (unitree_rl_gym).
#
# Abgeleitet von unitree_rl_gym G1 (deploy/deploy_mujoco/configs/g1.yaml, Stand
# 2026-07). H2 hat DIESELBE Beinstruktur wie G1 (6 DoF/Bein: hip_pitch/roll/
# yaw, knee, ankle_pitch/roll = 12 Bein-DoF gesamt) und dieselben Gelenknamen
# wie g1_29dof (Arme/Taille) — siehe training/h2_joint_map.md.
#
# WICHTIG — Gewichte NICHT von G1 übertragbar: G1 ist ca. 1,3 m / 35 kg, der H2
# ca. 1,8 m / 70 kg (deutlich schwerer/größer). kps/kds/default_angles unten
# sind G1-STARTWERTE, keine für H2 trainierten/eingemessenen Werte. Vor dem
# ersten Lauf-Versuch mit trainierter H2-Policy neu einmessen/tunen (siehe
# training/README.md, Schritt "Tuning").
#
# ACHTUNG — Gelenkreihenfolge Knöchel weicht von G1 ab: G1 deklariert je Bein
# [..., ankle_pitch, ankle_roll], der H2 (unitree_mujoco h2_mujoco.xml) dagegen
# [..., ankle_roll, ankle_pitch] (Motor- UND qpos-Reihenfolge). Die Arrays
# unten sind bereits auf die H2-Reihenfolge umsortiert — siehe
# training/h2_joint_map.md, Abschnitt "Achtung: Knöchel-Reihenfolge".

# Policy existiert noch NICHT — entsteht erst durch das Training (siehe
# training/README.md). Platzhalterpfade, analog zum G1-Muster.
policy_path: "{LEGGED_GYM_ROOT_DIR}/deploy/pre_train/h2/motion.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/h2/scene.xml"

# Von G1 übernommen (unitree_rl_gym g1.yaml) — 60s Sim-Dauer, 500 Hz Physik,
# 50 Hz Regler (simulation_dt * control_decimation = 0.02s).
simulation_duration: 60.0
simulation_dt: 0.002
control_decimation: 10

# kps/kds: 1:1 G1-Startwerte (Reihenfolge: hip_pitch, hip_roll, hip_yaw, knee,
# ankle_roll, ankle_pitch — H2-Reihenfolge). Bei G1 sind beide Knöchel-Gains
# ohnehin identisch (40 / 2), die Knöchel-Vertauschung wirkt sich auf kps/kds
# NICHT aus — nur auf default_angles (s.u.). Startwerte, am H2 neu einmessen.
kps: [100, 100, 100, 150, 40, 40, 100, 100, 100, 150, 40, 40]
kds: [2, 2, 2, 4, 2, 2, 2, 2, 2, 4, 2, 2]

# default_angles: G1-Stand-Pose [-0.1, 0.0, 0.0, 0.3, -0.2, 0.0] je Bein
# (hip_pitch, hip_roll, hip_yaw, knee, ankle_pitch, ankle_roll), UMSORTIERT auf
# H2-Reihenfolge (ankle_roll VOR ankle_pitch): [-0.1, 0.0, 0.0, 0.3, 0.0, -0.2].
# Reine Übernahme des G1-Arrays OHNE Umsortierung wäre falsch (ankle_roll
# bekäme den pitch-Wert und umgekehrt). Platzhalter — H2-Stand-Pose (schwerer/
# größer, andere Massenverteilung) muss mit H2-URDF/Training neu bestimmt
# werden.
default_angles: [-0.1, 0.0, 0.0, 0.3, 0.0, -0.2,
                  -0.1, 0.0, 0.0, 0.3, 0.0, -0.2]

# Von G1 übernommen (Beobachtungs-/Aktionsskalierung, unitree_rl_gym
# deploy_mujoco.py): ang_vel*0.25, dof_pos*1.0, dof_vel*0.05, action*0.25.
ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
# cmd_scale = [vx, vy, yaw_rate] Skalierung des Geschwindigkeitsbefehls (G1).
cmd_scale: [2.0, 2.0, 0.25]

# num_actions = 12 Bein-DoF (Arme/Taille werden von dieser Lauf-Policy NICHT
# gesteuert, siehe h2_joint_map.md). num_obs = 47 = 3 (ang_vel) + 3 (gravity)
# + 3 (cmd) + 12 (dof_pos) + 12 (dof_vel) + 12 (letzte Aktion) + 2 (sin/cos
# Gangphase), exakt wie in unitree_rl_gym deploy_mujoco.py aufgebaut. MUSS
# exakt zur trainierten Policy passen (Trainings-Env-Config ist die
# Wahrheitsquelle, nicht diese Datei).
num_actions: 12
num_obs: 47

# Anfangs-Geschwindigkeitsbefehl [vx, vy, yaw_rate], von G1 übernommen.
cmd_init: [0.5, 0, 0]
