# Benannte Standorte in der Zelle. Position [x, y, theta] in der Zellen-Basis (m, m, rad).
# Platzhalterwerte — am Zielsystem einmessen.
stations:
  home:           { position: [0.0, 0.0, 0.0],    description: "Parkposition" }
  part_storage:   { position: [2.0, 1.0, 1.57],   description: "Teilelager / Rohteil-Magazin" }
  machine:        { position: [0.0, 2.0, 0.0],    description: "Induktionshaertemaschine (Beschickung)" }
  dropoff_box:    { position: [-1.5, 1.0, -1.57], description: "Kiste fuer Fertigteile" }
  inductor_shelf: { position: [1.5, -1.5, 0.78],  description: "Regal mit Induktoren (Werkzeugwechsel)" }

# Parameter des Closed-Loop-Navigationsreglers (NavigatingLocomotion).
# Alle Werte sind Platzhalter — am Zielsystem mit echter LiDAR-Odometrie kalibrieren.
nav:
  max_linear: 0.5      # m/s  — maximale Translationsgeschwindigkeit
  max_angular: 0.8     # rad/s — maximale Winkelgeschwindigkeit
  kp_linear: 1.0       # P-Verstärkung Translation
  kp_angular: 1.5      # P-Verstärkung Rotation
  tol_xy: 0.05         # m    — Positionstoleranz (Ziel erreicht)
  tol_theta: 0.05      # rad  — Orientierungstoleranz (Ziel erreicht)
  dt: 0.1              # s    — Regeltakt (10 Hz)
  max_steps: 2000      # maximale Regelschritte vor Timeout-Abbruch
